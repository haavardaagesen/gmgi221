name: deploy-book

on:
  push:
    branches: main
  workflow_dispatch:

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install jupyter-book

    - name: Debug + remove notebook checkpoints and stray TOC checkpoints
      run: |
        echo "PWD: $(pwd)"
        echo "Listing top-level files:"
        ls -lah
        echo "Find any .ipynb_checkpoints, _toc-checkpoint.yml or _toc.yml files:"
        find . -name ".ipynb_checkpoints" -print || true
        find . -name "_toc-checkpoint.yml" -print || true
        find . -name "_toc.yml" -print | sed -n '1,200p' || true
        echo "Removing all .ipynb_checkpoints and any _toc-checkpoint.yml"
        find . -type d -name ".ipynb_checkpoints" -prune -exec rm -rf {} + || true
        find . -name "_toc-checkpoint.yml" -exec rm -f {} + || true
        echo "Verify removal:"
        find . -name ".ipynb_checkpoints" -print || echo "no checkpoints found"
        find . -name "_toc-checkpoint.yml" -print || echo "no _toc-checkpoint.yml found"
        echo "Show repo status (tracked files):"
        git ls-files | egrep -i "\.ipynb_checkpoints|_toc-checkpoint.yml" || true

    - name: Build the book
      run: jupyter-book build .

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _build/html

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        clean: true