name: deploy-book

on:
  push:
    branches: main
  workflow_dispatch:

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install jupyter-book

    - name: Clean previous build + remove checkpoints
      run: |
        echo "Removing prior _build and any .ipynb_checkpoints or _toc-checkpoint.yml"
        rm -rf _build
        find . -type d -name ".ipynb_checkpoints" -prune -exec rm -rf {} + || true
        find . -name "_toc-checkpoint.yml" -exec rm -f {} + || true
        echo "Tracked checkpoint files (should be none):"
        git ls-files | egrep -i "\.ipynb_checkpoints|_toc-checkpoint.yml" || true

    - name: Build the book
      run: jupyter-book build . -v

    - name: Verify build output
      run: |
        echo "Listing _build:"
        ls -la _build || true
        echo "Listing _build/html:"
        if [ -d "_build/html" ]; then
        ls -la _build/html
        else
        echo "_build/html missing — build failed"
        # print any sphinx/jupyter-book build logs (if present)
        tail -n +1 _build/.log || true
        exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _build/html

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        clean: true