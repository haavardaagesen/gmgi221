name: deploy-book

on:
  push:
    branches: main
  workflow_dispatch:

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install jupyter-book

    - name: Clean previous build + remove checkpoints
      run: |
        echo "Removing prior _build and any .ipynb_checkpoints or _toc-checkpoint.yml"
        rm -rf _build
        find . -type d -name ".ipynb_checkpoints" -prune -exec rm -rf {} + || true
        find . -name "_toc-checkpoint.yml" -exec rm -f {} + || true
        echo "Tracked checkpoint files (should be none):"
        git ls-files | egrep -i "\.ipynb_checkpoints|_toc-checkpoint.yml" || true

    - name: CI diagnostics
      run: |
        echo "===== Environment ====="
        python --version
        which python || true
        pip --version
        pip list --disable-pip-version-check
        echo
        echo "===== jupyter-book binary ====="
        command -v jupyter-book || echo "jupyter-book not found"
        jupyter-book --version || true
        echo
        echo "===== Repo top ====="
        pwd
        ls -la
        echo "Contents of _toc.yml (head):"
        sed -n '1,120p' _toc.yml || true
        echo
        echo "===== Git tracked checkpoints ====="
        git ls-files | egrep -i '\.ipynb_checkpoints|_toc-checkpoint.yml' || echo "none tracked"
        echo
        echo "===== Show last 200 lines of pip install (if any) ====="
        # print pip install logs if available from previous step (optional)
        if [ -f /home/runner/.cache/pip/log/debug.log ]; then tail -n 200 /home/runner/.cache/pip/log/debug.log; fi

    - name: Build the book (verbose log)
      run: |
        echo "jupyter-book version: $(jupyter-book --version || true)"
        echo "Start build at $(date)"
        set -o pipefail
        jupyter-book build . > build.log 2>&1 || { echo "Build failed — dumping build.log"; tail -n 500 build.log; exit 1; }
        echo "Build succeeded — tail of build.log:"
        tail -n 200 build.log

    - name: Verify build output
      run: |
        echo "Listing _build:"
        ls -la _build || true
        echo "Listing _build/html:"
        if [ -d "_build/html" ]; then
        ls -la _build/html
        else
        echo "_build/html missing — build failed"
        # print any sphinx/jupyter-book build logs (if present)
        tail -n +1 _build/.log || true
        exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _build/html

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        clean: true